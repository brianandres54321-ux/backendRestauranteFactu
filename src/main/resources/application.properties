# spring.application.name=backend_factu
# Conexión a Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/empresas
spring.datasource.username=brian
spring.datasource.password=0000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' creará las tablas si faltan, pero ten cuidado con los cambios manuales en SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true